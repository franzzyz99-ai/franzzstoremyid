<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANZZ STORE ID</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#000814;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#001d4d,#000814),
radial-gradient(circle at bottom,#003366,#000814);
}

.container{
position:relative;
z-index:2;
text-align:center;
}

.logo-img{
width:150px;
height:150px;
object-fit:cover;
border-radius:50%;
border:4px solid #00d4ff;
box-shadow:
0 0 20px #00d4ff,
0 0 40px #00d4ff,
0 0 80px #00d4ff;
animation:pulse 2s infinite;
}

.title{
margin-top:20px;
font-size:40px;
font-weight:bold;
color:white;
text-shadow:0 0 20px #00d4ff;
}

.subtitle{
margin-top:5px;
color:#00d4ff;
letter-spacing:3px;
}

.progress{
width:320px;
height:12px;
background:rgba(255,255,255,.1);
border-radius:20px;
overflow:hidden;
margin-top:30px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00d4ff,#00ff88);
box-shadow:0 0 20px #00d4ff;
}

.percent{
margin-top:15px;
color:white;
font-size:20px;
font-weight:bold;
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.star{
position:absolute;
width:3px;
height:3px;
background:#00d4ff;
border-radius:50%;
box-shadow:0 0 10px #00d4ff;
animation:move 8s linear infinite;
}

@keyframes move{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="stars" id="stars"></div>

<div class="container">

<!-- GANTI LINK LOGO DI BAWAH -->
<img src="https://files.catbox.moe/nsifgl.jpg" class="logo-img">

<div class="title">FRANZZ STORE</div>
<div class="subtitle">DIGITAL STORE INDONESIA</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="percent" id="percent">0%</div>

</div>

<script>

for(let i=0;i<60;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"%";
star.style.animationDuration=(5+Math.random()*5)+"s";
star.style.animationDelay=Math.random()*5+"s";
document.getElementById("stars").appendChild(star);
}

let p=0;
let bar=document.getElementById("bar");
let percent=document.getElementById("percent");

let loading=setInterval(()=>{
p++;
bar.style.width=p+"%";
percent.innerHTML=p+"%";

if(p>=100){
clearInterval(loading);
percent.innerHTML="MEMASUKI WEBSITE...";
setTimeout(()=>{
window.location.href="https://franzzstoreid.base44.app";
},1000);
}
},40);

</script>

</body>
</html>
