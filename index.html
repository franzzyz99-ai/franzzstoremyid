<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>franzzstore.store</title>

<meta http-equiv="refresh" content="5;url=https://franzzstoreid.base44.app">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fff;
    color:#333;
    padding:30px 20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.domain{
    font-size:60px;
    font-weight:300;
    margin-top:80px;
}

.title{
    font-size:42px;
    margin-top:10px;
    margin-bottom:20px;
}

.desc{
    font-size:24px;
    line-height:1.6;
    color:#444;
}

.verify-box{
    margin-top:40px;
    border:1px solid #ddd;
    border-radius:8px;
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.loader{
    display:flex;
    align-items:center;
    gap:15px;
}

.spinner{
    width:24px;
    height:24px;
    border:3px solid #ddd;
    border-top:3px solid #2ecc71;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

.cloudflare{
    text-align:right;
    font-size:14px;
    color:#666;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.redirect{
    margin-top:20px;
    color:#666;
}
</style>
</head>
<body>

<div class="container">

    <h1 class="domain">franzzstore.store</h1>

    <div class="title">Melakukan verifikasi keamanan</div>

    <p class="desc">
        Situs web menggunakan layanan keamanan untuk melindungi dari bot jahat.
        Halaman ini ditunjukkan semasa kami memverifikasi bahwa Anda bukan bot.
    </p>

    <div class="verify-box">
        <div class="loader">
            <div class="spinner"></div>
            <span>Melakukan verifikasi...</span>
        </div>

        <div class="cloudflare">
            <strong>CLOUDFLARE</strong><br>
            Privasi • Bantuan
        </div>
    </div>

    <p class="redirect">
        Mengalihkan ke Franz Store...
    </p>

</div>

<script>
setTimeout(() => {
    window.location.href = "https://franzzstoreid.base44.app";
}, 5000);
</script>

</body>
</html>
